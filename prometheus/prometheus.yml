global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'monolith-kv-sim'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Satu job per node agar label instance = alamat Redis (mudah dipilih di Grafana).
  - job_name: 'redis_exporter_redis1'
    static_configs:
      - targets: ['redis-exporter-1:9121']
        labels:
          component: 'redis-cluster'
          storage_type: 'in-memory-cache'
          instance: 'redis-1:7001'

  - job_name: 'redis_exporter_redis2'
    static_configs:
      - targets: ['redis-exporter-2:9121']
        labels:
          component: 'redis-cluster'
          storage_type: 'in-memory-cache'
          instance: 'redis-2:7002'

  - job_name: 'redis_exporter_redis3'
    static_configs:
      - targets: ['redis-exporter-3:9121']
        labels:
          component: 'redis-cluster'
          storage_type: 'in-memory-cache'
          instance: 'redis-3:7003'

  - job_name: 'joiner'
    static_configs:
      - targets: ['joiner:8080']
        labels:
          component: 'derived-data'
    metrics_path: /metrics

  # HDFS exporter - metrics dari Namenode JMX
  - job_name: 'hdfs'
    static_configs:
      - targets: ['hdfs-exporter:9070']
        labels:
          component: 'hdfs-cluster'
          storage_type: 'on-disk-kv-store'
